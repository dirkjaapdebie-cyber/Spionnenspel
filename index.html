<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>OPERATIE MEESTERSPION</title>
    <style>
        body { background: #000; color: #ccc; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        .page { display: none; }
        .active { display: block; }
        h1 { color: #8b0000; text-transform: uppercase; letter-spacing: 2px; }
        input { background: #111; border: 1px solid #444; color: #fff; padding: 10px; margin: 10px; text-align: center; }
        button { background: #8b0000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; margin: 20px auto; border: 1px solid #333; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
        th { background: #1a1a1a; font-size: 0.8em; }
        .clickable { cursor: pointer; height: 30px; font-weight: bold; }
        .check { color: #38a169; }
        .cross { color: #e53e3e; }
        #timer { font-size: 2.5em; color: #8b0000; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

<div id="p1" class="page active">
    <h1>OPERATIE MEESTERSPION</h1>
    <p>Identificatie vereist.</p>
    <input type="text" id="user" placeholder="Geef je codenaam...">
    <br>
    <button onclick="start()">START MISSIE</button>
    <audio id="music" src="https://cdn2.suno.ai/mf6NVMMhVW5F8XTL.mp3" loop></audio>
</div>

<div id="p2" class="page">
    <h1>LOGIKWIS MATRIX: MEESTERSPION</h1>
    <div id="timer">00:00</div>
    <table>
        <thead>
            <tr>
                <th>Echte Naam</th>
                <th>Codenaam</th>
                <th>Geheime Code</th>
                <th>Voorwerp</th>
                <th>Locatie</th>
            </tr>
        </thead>
        <tbody id="matrix"></tbody>
    </table>
</div>

<script>
    function start() {
        document.getElementById('music').play();
        document.getElementById('p1').classList.remove('active');
        document.getElementById('p2').classList.add('active');
        runTimer();
    }

    const namen = ["Miriam", "DirkJaap", "Hannah", "Tommie", "Joshua", "Judith", "Micha", "Annewil"];
    const tbody = document.getElementById('matrix');
    
    // Matrix opbouwen met de clickable Logikwis-logica
    namen.forEach(n => {
        let row = `<tr><td>${n}</td>`;
        for(let i=0; i<4; i++) {
            row += `<td class="clickable" onclick="toggle(this)"></td>`;
        }
        row += `</tr>`;
        tbody.innerHTML += row;
    });

    function toggle(cell) {
        if (cell.innerHTML === "") {
            cell.innerHTML = "✓";
            cell.className = "clickable check";
        } else if (cell.innerHTML === "✓") {
            cell.innerHTML = "✗";
            cell.className = "clickable cross";
        } else {
            cell.innerHTML = "";
            cell.className = "clickable";
        }
    }

    let s = 0;
    function runTimer() {
        setInterval(() => {
            s++;
            let m = Math.floor(s/60).toString().padStart(2, '0');
            let sec = (s%60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sec}`;
        }, 1000);
    }
</script>
</body>
</html>
