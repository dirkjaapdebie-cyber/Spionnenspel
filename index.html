<html lang="nl">
<head>
    <meta charset="UTF-8">

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        
        /* ECHTE LOGIGRAM MATRIX STYLING */
        .matrix-container { overflow-x: auto; margin-bottom: 40px; background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        table { border-collapse: collapse; margin: 0 auto; }
        td, th { border: 1px solid #444; width: 35px; height: 35px; text-align: center; vertical-align: middle; padding: 0; }
        
        th.row-header { text-align: right; width: 140px; padding-right: 10px; background: #252525; color: #fff; font-size: 0.85em; }
        th.col-header { height: 140px; background: #252525; vertical-align: bottom; padding-bottom: 10px; }
        .vertical-text { transform: rotate(-90deg); white-space: nowrap; display: inline-block; width: 35px; color: #38bdf8; font-size: 0.85em; font-weight: bold; text-align: left; }
        
        /* Dikke randen voor de sub-blokken (zoals in het screenshot) */
        .thick-right { border-right: 3px solid #38bdf8; }
        .thick-bottom { border-bottom: 3px solid #38bdf8; }
        .blackout { background: #121212; border: none; }
        
        .cell { cursor: pointer; font-weight: bold; font-size: 1.2em; user-select: none; }
        .cell:hover { background: #2a2a2a; }
        .check { color: #10b981; background: rgba(16, 185, 129, 0.15); }
        .cross { color: #ef4444; background: rgba(239, 68, 68, 0.15); }

        /* DM INTERFACE */
        .chat-container { 
            width: 100%; 
            max-width: 600px; 
            background: #0b141a; 
            border: 1px solid #222; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .chat-header { background: #202c33; padding: 12px 15px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #2a3942; }
        .selector-row { display: flex; gap: 10px; align-items: center; }
        .selector-row label { font-size: 0.85em; color: #8696a0; min-width: 65px; }
        .selector-row select { background: #2a3942; color: #fff; border: none; padding: 6px; border-radius: 4px; cursor: pointer; flex: 1; }
        
        .chat-messages { 
            height: 220px; 
            padding: 15px; 
            overflow-y: auto; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-color: #0b141a;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 0.95em; line-height: 1.4; }
        .message .timestamp { font-size: 0.7em; color: #8696a0; display: block; text-align: right; margin-top: 4px; }
        .message.received { background: #202c33; color: #e9edef; align-self: flex-start; border-top-left-radius: 0; }
        .message.sent { background: #005c4b; color: #e9edef; align-self: flex-end; border-top-right-radius: 0; }
        
        .chat-input-area { background: #202c33; padding: 10px; display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; background: #2a3942; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; outline: none; }
        .chat-input-area button { background: #00a884; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .chat-input-area button:hover { background: #008f72; }
    </style>
</head>

    <div class="chat-container">
        <div class="chat-header">
            <div class="selector-row">
                <label>Jij bent:</label>
                <select id="chatMe" onchange="updateChatView()">
                    <option value="Miriam">Miriam</option>
                    <option value="DirkJaap">DirkJaap</option>
                    <option value="Hannah">Hannah</option>
                    <option value="Tommie">Tommie</option>
                    <option value="Joshua">Joshua</option>
                    <option value="Judith">Judith</option>
                    <option value="Micha">Micha</option>
                    <option value="Annewil">Annewil</option>
                </select>
            </div>
            <div class="selector-row">
                <label>Bericht aan:</label>
                <select id="chatTarget" onchange="updateChatView()">
                    <option value="DirkJaap">DirkJaap</option>
                    <option value="Miriam">Miriam</option>
                    <option value="Hannah">Hannah</option>
                    <option value="Tommie">Tommie</option>
                    <option value="Joshua">Joshua</option>
                    <option value="Judith">Judith</option>
                    <option value="Micha">Micha</option>
                    <option value="Annewil">Annewil</option>
                </select>
            </div>
        </div>
        
        <div class="chat-messages" id="chatGrid"></div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Typ een beveiligd 1-op-1 bericht..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Verzend</button>
        </div>
    </div>

    <script>
        let messageDatabase = [];

        // Schakelen tussen + en - (conform de afbeelding)
        function toggle(cell) {
            if (cell.innerHTML === "") {
                cell.innerHTML = "–";
                cell.className = "cell cross";
            } else if (cell.innerHTML === "–") {
                cell.innerHTML = "+";
                cell.className = "cell check";
            } else {
                cell.innerHTML = "";
                cell.className = "cell";
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const messageText = input.value.trim();
            if (messageText === "") return;

            const me = document.getElementById('chatMe').value;
            const target = document.getElementById('chatTarget').value;

            if (me === target) {
                alert("Je kunt geen berichten naar jezelf sturen, agent.");
                return;
            }

            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            messageDatabase.push({ from: me, to: target, text: messageText, time: time });

            input.value = "";
            updateChatView();
        }

        function updateChatView() {
            const me = document.getElementById('chatMe').value;
            const target = document.getElementById('chatTarget').value;
            const chatGrid = document.getElementById('chatGrid');
            
            chatGrid.innerHTML = ""; 

            const conversation = messageDatabase.filter(msg => 
                (msg.from === me && msg.to === target) || (msg.from === target && msg.to === me)
            );

            if (conversation.length === 0) {
                chatGrid.innerHTML = `<div style="text-align:center; color:#8696a0; font-size:0.85em; margin-top:20px;">Geen gecodeerde berichten met deze agent. Het kanaal is schoon.</div>`;
                return;
            }

            conversation.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = (msg.from === me) ? "message sent" : "message received";
                msgDiv.innerHTML = `${msg.text}<span class="timestamp">${msg.time}</span>`;
                chatGrid.appendChild(msgDiv);
            });

            chatGrid.scrollTop = chatGrid.scrollHeight;
        }

        function checkEnter(e) { if (e.key === 'Enter') sendMessage(); }
        updateChatView();
    </script>
