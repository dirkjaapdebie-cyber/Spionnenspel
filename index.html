<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Logikwis Matrix - Meesterspion</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        h1 { color: #333; text-align: center; }
        .intro { text-align: center; margin-bottom: 20px; color: #555; }
        table { border-collapse: collapse; margin: 0 auto; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; min-width: 80px; }
        th { background: #e0e0e0; font-weight: bold; }
        .clickable { cursor: pointer; font-size: 1.2em; font-weight: bold; }
        .clickable:hover { background: #eee; }
        .check { color: green; }
        .cross { color: red; }
    </style>
</head>
<body>

    <h1>🕵️‍♂️ LOGIKWIS MATRIX: MEESTERSPION</h1>
    <p class="intro">Vul de headers in uit de paspoort-interviews en klik in het raster om vinkjes (✓) of kruisjes (✗) te plaatsen.</p>

    <table id="matrix">
        <thead>
            <tr>
                <th>Echte Naam</th>
                <th>Codenaam</th>
                <th>Geheime Code</th>
                <th>Voorwerp</th>
                <th>Locatie</th>
            </tr>
        </thead>
        <tbody>
            <!-- 8 rijen voor de 8 spionnen -->
            <script>
                for(let i=0; i<8; i++) {
                    document.write('<tr>');
                    for(let j=0; j<5; j++) {
                        document.write('<td class="clickable" onclick="toggle(this)"></td>');
                    }
                    document.write('</tr>');
                }
            </script>
        </tbody>
    </table>

    <script>
        function toggle(cell) {
            if (cell.innerHTML === "") {
                cell.innerHTML = "✓";
                cell.className = "clickable check";
            } else if (cell.innerHTML === "✓") {
                cell.innerHTML = "✗";
                cell.className = "clickable cross";
            } else {
                cell.innerHTML = "";
                cell.className = "clickable";
            }
        }
    </script>
</body>
</html>
